    <!-- GitHub Pages SPA route restoration -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg text-body-lg overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
    <div id="root" class="w-full h-full min-h-screen flex flex-col relative"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
